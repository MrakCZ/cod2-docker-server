networks:
  cod2server_net:
    name: cod2server_net
    driver: bridge

services:
  cod2_server:
    build: .
    container_name: cod2server
    restart: unless-stopped
    networks:
      - cod2server_net
    ports:
      - "28976:28976/tcp"
      - "28976:28976/udp"
    volumes:
      - ./main:/home/cod2/main:ro
    extra_hosts:
      - "cod2master.activision.com:0.0.0.0"
      - "master.cod2x.me:0.0.0.0"
    command:
      [
        "+set", "dedicated", "1",
        "+set", "net_port", "28976",
        "+set", "sv_cheats", "0",
        "+set", "sv_punkbuster", "0",
        "+pb_sv_disable",
        "+set", "sv_update", "0",
        "+exec", "server.cfg"
      ]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  cod2_server_rifle:
    build: .
    container_name: cod2server_rifle
    restart: unless-stopped
    networks:
      - cod2server_net
    ports:
      - "28977:28977/tcp"
      - "28977:28977/udp"
    volumes:
      - ./main_rifle:/home/cod2/main:ro
    extra_hosts:
      - "cod2master.activision.com:0.0.0.0"
      - "master.cod2x.me:0.0.0.0"
    command:
      [
        "+set", "dedicated", "1",
        "+set", "net_port", "28977",
        "+set", "sv_cheats", "0",
        "+set", "sv_punkbuster", "0",
        "+pb_sv_disable",
        "+set", "sv_update", "0",
        "+exec", "rifle_mp.cfg"
      ]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  cod2_dl:
    container_name: cod2_dl
    image: nginx:alpine
    restart: unless-stopped
    networks:
      - cod2server_net
    volumes:
      - ./main:/usr/share/nginx/html/default:ro
      - ./main_rifle:/usr/share/nginx/html/rifle:ro
      - ./web/dl-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "28980:80"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
