limit_req_zone $binary_remote_addr zone=dl:10m rate=10r/m;

server {
    listen 80;
    autoindex off;
    server_tokens off;

    if ($request_method !~ ^(GET|HEAD)$) {
        return 444;
    }

    location ~ ^/dl/default/main/([a-zA-Z0-9_\-\.]+\.iwd)$ {
        limit_req zone=dl burst=20 nodelay;
        alias /usr/share/nginx/html/default/$1;
        limit_rate 50m;
        add_header X-Content-Type-Options nosniff;
        add_header X-Robots-Tag noindex;
        add_header Cache-Control "public, max-age=86400";
    }

    location ~ ^/dl/rifle/main/([a-zA-Z0-9_\-\.]+\.iwd)$ {
        limit_req zone=dl burst=20 nodelay;
        alias /usr/share/nginx/html/rifle/$1;
        limit_rate 50m;
        add_header X-Content-Type-Options nosniff;
        add_header X-Robots-Tag noindex;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        return 444;
    }

	location /health {
		access_log off;
		return 200 "ok";
	}
}
